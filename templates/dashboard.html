<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم Z-AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <nav class="p-4 border-b border-gray-800 flex justify-between">
        <span class="text-xl font-bold text-blue-500">Z-AI PLATFORM</span>
        <a href="/logout" class="text-red-400">تسجيل خروج</a>
    </nav>

    <div class="grid grid-cols-4 gap-4 p-6">
        <div class="col-span-1 bg-gray-800 p-4 rounded-lg h-screen overflow-y-auto">
            <h2 class="text-lg font-bold mb-4">منشآتك السابقة</h2>
            {% for proj in user.projects %}
            <div class="p-2 mb-2 bg-gray-700 rounded cursor-pointer hover:bg-gray-600">
                {{ proj.title }}...
            </div>
            {% endfor %}
        </div>

        <div class="col-span-3 space-y-4">
            <div id="output" class="bg-black p-6 rounded-lg min-h-[400px] border border-blue-900 whitespace-pre-wrap">
                أهلاً {{ user.email }}.. اطلب تصميم موقع أو برزنتيشن الآن!
            </div>
            
            <div class="flex gap-2">
                <input type="text" id="prompt" class="flex-1 p-4 rounded-lg bg-gray-800 border-none outline-none focus:ring-2 focus:ring-blue-500" placeholder="اكتب طلبك هنا...">
                <button onclick="send()" class="bg-blue-600 px-8 py-4 rounded-lg font-bold">توليد بالقوة القصوى</button>
            </div>
        </div>
    </div>

    <script>
        async function send() {
            const prompt = document.getElementById('prompt').value;
            const output = document.getElementById('output');
            output.innerHTML = "جاري التوليد والبرمجة...";
            
            const res = await fetch('/ai_process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({prompt: prompt})
            });
            const data = await res.json();
            output.innerText = data.result;
        }
    </script>
</body>
</html>
